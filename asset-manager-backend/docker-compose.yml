services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: patrimoine
      POSTGRES_PASSWORD: patrimoine
      POSTGRES_DB: patrimoine_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patrimoine -d patrimoine_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.main
    restart: always
    ports:
      - "8000:8000"

volumes:
  pgdata:
